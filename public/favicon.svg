<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- White Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="white" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Body Base (Forest) -->
    <path d="M10 24C10 18.4772 14.4772 14 20 14H44C49.5228 14 54 18.4772 54 24V50C54 52.2091 52.2091 54 50 54H14C11.7909 54 10 52.2091 10 50V24Z" fill="#102C26"/>
    
    <!-- Top Section (Champagne) -->
    <path d="M10 24C10 18.4772 14.4772 14 20 14H44C49.5228 14 54 18.4772 54 24V32H10V24Z" fill="#F7E7CE"/>
    
    <!-- Iconic "V" Front Shape -->
    <path d="M10 32L32 44L54 32V36L32 48L10 36V32Z" fill="#F7E7CE"/>
    
    <!-- Windows (Windshield) -->
    <rect x="14" y="18" width="16" height="10" rx="2" fill="#102C26" fill-opacity="0.2"/>
    <rect x="34" y="18" width="16" height="10" rx="2" fill="#102C26" fill-opacity="0.2"/>
    
    <!-- Headlights -->
    <circle cx="18" cy="40" r="4" fill="#F7E7CE"/>
    <circle cx="46" cy="40" r="4" fill="#F7E7CE"/>
    <circle cx="18" cy="40" r="2" fill="white" fill-opacity="0.5"/>
    <circle cx="46" cy="40" r="2" fill="white" fill-opacity="0.5"/>
    
    <!-- Bumper -->
    <rect x="12" y="50" width="40" height="4" rx="2" fill="#F7E7CE" fill-opacity="0.3"/>
    
    <!-- VW Style Logo Circle -->
    <circle cx="32" cy="36" r="3" stroke="#F7E7CE" stroke-width="1.5"/>
    
    <!-- Wheels -->
    <rect x="14" y="54" width="8" height="3" rx="1.5" fill="#0a1e1a"/>
    <rect x="42" y="54" width="8" height="3" rx="1.5" fill="#0a1e1a"/>
  </g>
</svg>
